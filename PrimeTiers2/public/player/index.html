<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PrimeTiers | Player Profile</title>
  <link rel="stylesheet" href="/css/globals.css"/>
  <link rel="stylesheet" href="/css/navbar.css"/>
  <link rel="stylesheet" href="/css/profile.css"/>
</head>
<body>
  <main id="profileMain" style="padding-top:80px">
    <div id="profileContent">
      <!-- Skeleton -->
      <div class="profile-skeleton">
        <div class="skeleton" style="height:220px;border-radius:0"></div>
        <div class="container" style="margin-top:-60px;position:relative;z-index:1">
          <div class="skeleton" style="width:100px;height:100px;border-radius:50%;margin-bottom:16px"></div>
          <div class="skeleton" style="width:200px;height:32px;margin-bottom:8px"></div>
          <div class="skeleton" style="width:120px;height:24px;margin-bottom:32px"></div>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px">
            <div class="skeleton" style="height:120px;border-radius:16px"></div>
            <div class="skeleton" style="height:120px;border-radius:16px"></div>
            <div class="skeleton" style="height:120px;border-radius:16px"></div>
            <div class="skeleton" style="height:120px;border-radius:16px"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="/js/components.js"></script>
  <script src="/js/profile.js"></script>
</body>
</html>
